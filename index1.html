<!DOCTYPE html>
<html lang=''>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Personal portfolio</title>
    <link rel='stylesheet' href='css/styles.css'>
    <script href="js/script.js"></script>
</head>


<body>
    <div id="app">
        <header>
            <h1>Simple portfolio website</h1>
        </header>

        <div class="nav">
            <a href="#about">About me</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>


        <div class="card">
            <h2>About Me</h2>
            <p>placeholder text for about me just to fill space hello how are you? today the weather is cool and windy i like potatos not tomatos</p>
            <p>cool tagline/one-liner</p>
            <img src="" alt="My photo">
        </div>


        <div class="card">
            <h2>Projects</h2>
            <div class="project">
                <h3>Project 1</h3>
                <p>disription</p>
                <img scr="" alt="project 1 img">
            </div>

            <div class="project">
                <h3>Project 2</h3>
                <p>disription</p>
                <img scr="" alt="project 2 img">
            </div>
        </div>


        <div class="contact">
            <form action="#" method="post" class="card">

                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input id="name" name="name" type="text" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email:</label>
                    <input id="email" name="email" type="text" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <label for="massage">Massage</label>
                    <textarea id="massage" name="massage" rows="4" placeholder="Write your Massage..." required></textarea>
                </div>

                <button type="submit" class="btn">Send</button>
            </form>
        </div>
    </div>
</body>
</html>
